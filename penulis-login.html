<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Penulis - Lazisnu Kedungrejo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #067d7d; --primary-dark: #055c5c; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #067d7d 0%, #043a3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .login-card h2 { margin-bottom: 10px; color: var(--primary); }
        .login-card p { color: #666; margin-bottom: 25px; font-size: 0.85rem; }
        .role-badge {
            background: #e6f4e6;
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: inline-block;
            margin-bottom: 15px;
        }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(6,125,125,0.2); }
        .toggle-password {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
        }
        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .back-link { display: block; margin-top: 20px; color: var(--primary); text-decoration: none; font-size: 0.85rem; }
        .error-msg { background: #fee; color: #ef4444; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; display: none; }
/* Style untuk label di input-group */
.input-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    font-size: 0.88rem;
    color: var(--text-dark);
}
    </style>
</head>
<body>
    <div class="login-card">
        <img src="assets/logo.png" alt="Logo" height="30" style="margin-bottom: 20px;">
        <h2>Login Penulis</h2>
        <p>Masuk untuk menulis dan mengelola artikel</p>
        
        <div class="error-msg" id="errorMsg"></div>
        
        <div class="input-group">
    <label for="penulisEmail">Email</label>
    <div class="input-wrapper">
        <input type="email" id="penulisEmail" placeholder="Email" autocomplete="off" value="penulis@lazisnu.com">
    </div>
</div>

<div class="input-group">
    <label for="penulisPassword">Password</label>
    <div class="input-wrapper">
        <input type="password" id="penulisPassword" placeholder="Password" value="penulis123">
        <button type="button" class="toggle-password" onclick="togglePassword('penulisPassword', this)">
            <i class="fas fa-eye-slash"></i>
        </button>
    </div>
</div>
        
        <button class="btn-login" onclick="penulisLogin()">
            <i class="fas fa-sign-in-alt"></i> Masuk ke Dashboard
        </button>
        
        <a href="login.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Kembali ke Login Donatur
        </a>
    </div>

    <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzLZjVSM20ZSlFW4xD-TMLKezjLhCtob61oDZ123eDkNH9msGE0QQLZqU-mywkXdQB_/exec';
    
    function togglePassword(fieldId, button) {
        const input = document.getElementById(fieldId);
        const icon = button.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        }
    }
    
    async function penulisLogin() {
        const email = document.getElementById('penulisEmail').value;
        const password = document.getElementById('penulisPassword').value;
        const errorMsg = document.getElementById('errorMsg');
        
        if (!email || !password) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = 'Email dan password harus diisi';
            return;
        }
        
        errorMsg.style.display = 'none';
        
        try {
            // Kirim sebagai application/x-www-form-urlencoded
            const formData = new URLSearchParams();
            formData.append('action', 'penulisLogin');
            formData.append('email', email);
            formData.append('password', password);
            
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: formData.toString()
            });
            
            const data = await response.json();
            console.log('Response dari server:', data); // Debug
            
            if (data.status === 'success') {
                localStorage.setItem('penulisLoggedIn', 'true');
                localStorage.setItem('penulisName', data.name);
                localStorage.setItem('penulisEmail', email);
                window.location.href = 'penulis-dashboard.html';
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'Email atau password salah. Akses khusus penulis.';
            }
        } catch (error) {
            console.error('Error:', error);
            errorMsg.style.display = 'block';
            errorMsg.innerText = 'Gagal terhubung ke server. Periksa koneksi.';
        }
    }
    
    document.getElementById('penulisPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') penulisLogin();
    });
</script>
</body>
</html>
