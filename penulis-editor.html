<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Editor Artikel - Lazisnu Kedungrejo</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Summernote CSS -->
  <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">

  <!-- Global CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Page CSS -->
  <link rel="stylesheet" href="css/penulis-editor.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<div class="dashboard-header">
  <div class="container">
    <div class="logo">
      <a href="index.html">
        <img src="assets/logo.png" alt="Logo Lazisnu">
      </a>
    </div>
    <a href="penulis-dashboard.html" class="btn-outline btn-sm">
      <i class="fas fa-arrow-left"></i> Kembali
    </a>
  </div>
</div>

<!-- ── Konten Utama ─────────────────────────────────────────── -->
<div class="container editor-wrap">

  <h1 class="editor-title" id="formTitle">✍️ Tulis Artikel Baru</h1>
  <p class="editor-subtitle">Buat artikel berita untuk dipublikasikan di website</p>

  <div class="editor-card">
    <form id="articleForm" autocomplete="off">

      <!-- ID artikel (diisi saat mode edit) -->
      <input type="hidden" id="articleId">

      <!-- Baris 1: Judul + Slug -->
      <div class="form-row">
        <div class="form-group">
          <label for="title">Judul Artikel <span class="req">*</span></label>
          <input type="text" id="title" class="form-control"
                 placeholder="Masukkan judul artikel" required>
        </div>
        <div class="form-group">
          <label for="slug">Slug / URL</label>
          <input type="text" id="slug" class="form-control"
                 placeholder="judul-artikel-otomatis">
          <small class="field-hint">Kosongkan untuk otomatis dari judul</small>
        </div>
      </div>

      <!-- Baris 2: Kategori + Tags -->
      <div class="form-row">
        <div class="form-group">
          <label for="category">Kategori <span class="req">*</span></label>
          <select id="category" class="form-control" required>
            <option value="">Memuat kategori...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="tags">
            Tags <small class="field-hint">(pisahkan dengan koma)</small>
          </label>
          <input type="text" id="tags" class="form-control"
                 placeholder="contoh: zakat, pendidikan, beasiswa">
        </div>
      </div>

      <!-- Featured Image / Thumbnail -->
<div class="form-group">
    <label>Featured Image / Thumbnail</label>
    <div class="image-upload-area" id="imageUploadArea"
         onclick="document.getElementById('imageFile').click()">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>Klik untuk upload gambar</p>
        <small>Format: JPG, PNG (Max 2MB)</small>
    </div>
    <input type="file" id="imageFile" accept="image/*"
           style="display:none;" onchange="previewImage(this)">
    <div class="image-preview" id="imagePreview"></div>
    <input type="hidden" id="featured_image">
    
    <!-- TAMBAHAN: Caption untuk Thumbnail -->
    <input type="text" id="thumbnail_caption" class="form-control" 
           placeholder="Caption untuk thumbnail (opsional)" 
           style="margin-top: 12px;">
</div>

      <!-- Excerpt -->
      <div class="form-group">
        <label for="excerpt">Ringkasan / Excerpt</label>
        <textarea id="excerpt" class="form-control" rows="3"
                  placeholder="Ringkasan singkat artikel (akan tampil di halaman berita)"></textarea>
      </div>

      <!-- Konten (Summernote WYSIWYG) -->
      <div class="form-group">
        <label for="content">Konten Artikel <span class="req">*</span></label>
        <textarea id="content" rows="15"
                  placeholder="Tulis konten artikel di sini..."></textarea>
      </div>

      <!-- SEO -->
      <div class="form-row">
        <div class="form-group">
          <label for="meta_title">
            Meta Title <small class="field-hint">(SEO)</small>
          </label>
          <input type="text" id="meta_title" class="form-control"
                 placeholder="Kosongkan = pakai judul artikel">
        </div>
        <div class="form-group">
          <label for="meta_description">
            Meta Description <small class="field-hint">(SEO, max 160 karakter)</small>
          </label>
          <textarea id="meta_description" class="form-control" rows="2"
                    placeholder="Deskripsi singkat untuk mesin pencari"></textarea>
        </div>
      </div>

<div class="form-row">
    <div class="form-group">
        <label for="publish_date">Tanggal Terbit</label>
        <input type="date" id="publish_date" class="form-control">
        <small style="color: var(--text-muted);">Kosongkan untuk menggunakan tanggal hari ini</small>
    </div>
</div>

      <!-- Tombol Aksi -->
      <div class="editor-actions">
        <button type="button" class="btn-warning" id="btnDraft"
                onclick="saveArticle('draft')">
          <i class="fas fa-save"></i> Simpan Draft
        </button>
        <button type="button" class="btn-success" id="btnPublish"
                onclick="saveArticle('published')">
          <i class="fas fa-paper-plane"></i> Publish Sekarang
        </button>
        <button type="button" class="btn-primary" onclick="previewArticle()">
          <i class="fas fa-eye"></i> Preview
        </button>
      </div>

    </form>
  </div><!-- /.editor-card -->

</div><!-- /.container -->

<!-- ── Scripts ──────────────────────────────────────────────── -->
<!-- jQuery + Summernote harus di-load SEBELUM penulis-editor.js -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>

<!-- main.js: GAS_URL, IMGBB_API_KEY, uploadToImgBB(), formatDate(), escapeHtml() -->
<script src="js/main.js"></script>

<!-- Logic halaman ini -->
<script src="js/penulis-editor.js"></script>

</body>
</html>
