<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Laporan Donatur - Lazisnu Kedungrejo</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin-dashboard.css">

  <style>
    .report-toolbar{
      background:var(--bg-white);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow-sm);
      padding:18px;
      margin-bottom:20px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:12px;
      align-items:end;
    }

    .report-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .report-summary{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-bottom:20px;
    }

    .summary-card{
      background:var(--bg-white);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow-sm);
      padding:18px;
    }

    .summary-card h3{
      margin:0;
      color:var(--primary);
      font-size:1.4rem;
    }

    .summary-card p{
      margin:5px 0 0;
      color:var(--text-muted);
      font-size:.85rem;
    }

    @media(max-width:900px){
      .report-toolbar,
      .report-summary{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body class="admin-wrap">

<div class="dashboard-header">
  <div class="container">
    <div class="logo">
      <a href="index.html">
        <img src="assets/logo.png" alt="Logo Lazisnu">
      </a>
    </div>

    <div class="header-right">
      <span class="admin-name" id="adminName"></span>
      <button id="darkModeToggle" class="dark-toggle">
        <i class="fas fa-moon"></i>
      </button>
      <button class="btn-danger btn-sm" onclick="logoutReportAdmin()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </div>
</div>

<div class="container" style="padding-bottom:60px;">

  <div class="admin-toolbar">
    <div class="toolbar-left">
      <a href="admin-dashboard.html" class="btn-refresh">
        <i class="fas fa-arrow-left"></i> Kembali Dashboard
      </a>
      <button class="btn-primary" onclick="openManualDonationModal()">
        <i class="fas fa-plus"></i> Input Donasi Manual
      </button>
      <button class="btn-refresh" onclick="downloadDonationTemplate()">
        <i class="fas fa-file-download"></i> Download Template
      </button>
      <label class="btn-refresh" style="cursor:pointer;">
        <i class="fas fa-file-upload"></i> Upload Excel
        <input type="file" id="excelUpload" accept=".xlsx,.xls" style="display:none;">
      </label>
    </div>
  </div>

  <div class="report-summary">
    <div class="summary-card">
      <h3 id="sumTotalDonation">Rp 0</h3>
      <p>Total Donasi</p>
    </div>
    <div class="summary-card">
      <h3 id="sumTransaction">0</h3>
      <p>Total Transaksi</p>
    </div>
    <div class="summary-card">
      <h3 id="sumDonatur">0</h3>
      <p>Total Donatur</p>
    </div>
    <div class="summary-card">
      <h3 id="sumPending">0</h3>
      <p>Pending</p>
    </div>
  </div>

  <div class="report-toolbar">
    <div class="form-group">
      <label>Tanggal Awal</label>
      <input type="date" id="filterStart" class="form-control">
    </div>

    <div class="form-group">
      <label>Tanggal Akhir</label>
      <input type="date" id="filterEnd" class="form-control">
    </div>

    <div class="form-group">
      <label>Program</label>
      <select id="filterCampaign" class="form-control">
        <option value="">Semua Program</option>
      </select>
    </div>

    <div class="form-group">
      <label>Status</label>
      <select id="filterStatus" class="form-control">
        <option value="">Semua Status</option>
        <option value="pending">Pending</option>
        <option value="paid">Paid</option>
        <option value="success">Success</option>
        <option value="failed">Failed</option>
      </select>
    </div>

    <div class="report-actions">
      <button class="btn-primary" onclick="applyDonationFilter()">
        <i class="fas fa-filter"></i> Filter
      </button>
      <button class="btn-refresh" onclick="exportDonationExcel()">
        <i class="fas fa-file-excel"></i> Excel
      </button>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Nama</th>
          <th>Email</th>
          <th>WA</th>
          <th>Program</th>
          <th>Nominal</th>
          <th>Metode</th>
          <th>Status</th>
          <th>Sumber</th>
          <th>Catatan</th>
        </tr>
      </thead>
      <tbody id="donationReportBody">
        <tr>
          <td colspan="10" class="text-center" style="padding:35px;">
            <i class="fas fa-spinner fa-spin" style="color:var(--primary);"></i>
            Memuat laporan...
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<div class="modal" id="manualDonationModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3><i class="fas fa-plus-circle"></i> Input Donasi Manual</h3>
      <span class="modal-close" onclick="closeManualDonationModal()">&times;</span>
    </div>

    <div class="form-group">
      <label>Tanggal</label>
      <input type="date" id="manualDate" class="form-control">
    </div>

    <div class="form-group">
      <label>Nama Donatur</label>
      <input type="text" id="manualName" class="form-control">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="manualEmail" class="form-control">
    </div>

    <div class="form-group">
      <label>No. WhatsApp</label>
      <input type="text" id="manualPhone" class="form-control">
    </div>

    <div class="form-group">
      <label>Program</label>
      <select id="manualCampaign" class="form-control"></select>
    </div>

    <div class="form-group">
      <label>Nominal</label>
      <input type="text" id="manualNominal" class="form-control" placeholder="Contoh: 100000">
    </div>

    <div class="form-group">
      <label>Metode</label>
      <select id="manualMethod" class="form-control">
        <option value="manual">Transfer Manual</option>
        <option value="qris">QRIS</option>
        <option value="cash">Tunai</option>
        <option value="bank">Transfer Bank</option>
      </select>
    </div>

    <div class="form-group">
      <label>Status</label>
      <select id="manualStatus" class="form-control">
        <option value="paid">Paid</option>
        <option value="pending">Pending</option>
      </select>
    </div>

    <div class="form-group">
      <label>Catatan</label>
      <textarea id="manualNote" class="form-control" rows="3"></textarea>
    </div>

    <button class="btn-primary w-100" onclick="saveManualDonation()">
      <i class="fas fa-save"></i> Simpan Donasi
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="js/main.js?v=20"></script>
<script src="js/admin-donatur-report.js?v=20"></script>

</body>
</html>
