<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Donatur - Lazisnu Kedungrejo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #067d7d 0%, #043a3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            text-align: center;
        }
        .auth-card .logo-img { height: 40px; margin: 0 auto 22px; }
        .auth-card h2 { color: var(--primary); margin-bottom: 6px; font-size: 1.4rem; }
        .auth-card > p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 24px; }
        .auth-footer-links { margin-top: 18px; display: flex; flex-direction: column; gap: 8px; }
        .auth-footer-links a { font-size: 0.83rem; color: var(--primary); }
        .auth-footer-links a.subtle { color: var(--text-muted); font-size: 0.78rem; }
        .auth-footer-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <img class="logo-img" src="assets/logo.png" alt="Logo Lazisnu">
        <h2>Login Donatur</h2>
        <p>Masukkan kredensial akun Anda</p>

        <div class="alert alert-danger" id="alertError"></div>
        <div class="alert alert-success" id="alertSuccess"></div>

        <div class="form-group" style="text-align:left;">
            <label>Email</label>
            <input type="email" id="donaturEmail" class="form-control" placeholder="email@anda.com" autocomplete="off">
        </div>
        <div class="form-group" style="text-align:left;">
            <label>Password</label>
            <div class="input-wrapper">
                <input type="password" id="donaturPassword" class="form-control" placeholder="Password">
                <button type="button" class="toggle-password" onclick="togglePassword('donaturPassword', this)">
                    <i class="fas fa-eye-slash"></i>
                </button>
            </div>
        </div>

        <button class="btn-primary w-100" onclick="donaturLogin()" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Masuk
        </button>

        <div class="auth-footer-links">
            <a href="register.html"><i class="fas fa-user-plus"></i> Belum punya akun? Daftar</a>
            <a href="admin-login.html" class="subtle"><i class="fas fa-shield-alt"></i> Login sebagai Admin</a>
            <a href="index.html" class="subtle"><i class="fas fa-home"></i> Kembali ke Beranda</a>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
